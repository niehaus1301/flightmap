name: Update Flight Data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: main
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch new flights from FlightRadar24
        run: npm run export-flights

      - name: Sync new flights into history
        run: npm run sync-history

      - name: Enrich flights with AeroAPI track data
        run: npm run enrich
        env:
          AEROAPI_KEY: ${{ secrets.AEROAPI_KEY }}
          MAX_FLIGHTS: "10"

      - name: Generate GeoJSON
        run: npm run generate-geojson

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/flight-history.json data/airline-icao-cache.json generated/flights.json generated/flightmap.geojson
          git diff --staged --quiet || git commit -m "chore: update flight data [skip ci]"
          git push
